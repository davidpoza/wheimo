version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: wheimo
      POSTGRES_USER: ${POSTGRES_USER:-wheimo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wheimo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - wheimo

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - wheimo

  wheimo-api:
    image: ghcr.io/davidpoza/wheimo-api:latest
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wheimo
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-wheimo}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-wheimo}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme-very-long-secret-key-for-jwt}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-2592000000}
      AES_PASSPHRASE: ${AES_PASSPHRASE:-changeme-aes-passphrase}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin@wheimo.com}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-admin}
      ATTACHMENTS_PATH: /data/attachments
      FETCHER_URL: http://wheimo-fetcher:8081
    volumes:
      - attachments-data:/data/attachments
    networks:
      - wheimo

  wheimo-fetcher:
    image: ghcr.io/davidpoza/wheimo-fetcher:latest
    restart: always
    depends_on:
      - redis
    environment:
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      AES_PASSPHRASE: ${AES_PASSPHRASE:-changeme-aes-passphrase}
      SERVER_PORT: 8081
    networks:
      - wheimo

  frontend:
    image: ghcr.io/davidpoza/wheimo-frontend:latest
    restart: always
    depends_on:
      - wheimo-api
    networks:
      - wheimo

  proxy:
    image: nginx:1.27-alpine
    container_name: wheimo-proxy
    restart: always
    depends_on:
      - wheimo-api
      - frontend
    ports:
      - "7342:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - wheimo

  adminer:
    image: adminer
    restart: always
    depends_on:
      - postgres
    # ports:
    #   - "7777:8080"
    networks:
      - wheimo

  postgres-backup:
    image: prodrigestivill/postgres-backup-local
    restart: always
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-wheimo}
      POSTGRES_USER: ${POSTGRES_USER:-wheimo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wheimo}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - postgres-backups:/backups
    networks:
      - wheimo

networks:
  wheimo:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  attachments-data:
  postgres-backups:
