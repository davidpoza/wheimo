<div class="tags-header">
  <h2>{{ 'tags.grid.title' | transloco }}</h2>
  <div class="tab-buttons">
    <p-button [label]="'tags.grid.tab.tags' | transloco" [text]="activeTab() !== 'tags'" (onClick)="activeTab.set('tags')" />
    <p-button [label]="'tags.grid.tab.rules' | transloco" [text]="activeTab() !== 'rules'" (onClick)="activeTab.set('rules')" />
  </div>
</div>

@if (activeTab() === 'tags') {
  <div class="create-row">
    <input pInputText [(ngModel)]="newTagName" (ngModelChange)="newTagName.set($event)" [placeholder]="'tags.grid.newTagPlaceholder' | transloco" class="create-input" />
    <p-button [label]="'tags.grid.add' | transloco" icon="pi pi-plus" (onClick)="createTag()" [disabled]="!newTagName().trim()" />
  </div>

  <p-table [value]="tags()" styleClass="p-datatable-sm" [sortField]="'name'" [sortOrder]="1">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">{{ 'tags.grid.col.name' | transloco }} <p-sortIcon field="name" /></th>
        <th style="width: 8rem"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-tag>
      <tr>
        <td>
          @if (editingId() === tag.id) {
            <input pInputText [(ngModel)]="editingName" (ngModelChange)="editingName.set($event)" class="w-full" />
          } @else {
            {{ tag.name }}
          }
        </td>
        <td>
          @if (editingId() === tag.id) {
            <p-button icon="pi pi-check" [text]="true" severity="success" (onClick)="saveEdit(tag)" />
            <p-button icon="pi pi-times" [text]="true" severity="secondary" (onClick)="cancelEdit()" />
          } @else {
            <p-button icon="pi pi-pencil" [text]="true" (onClick)="startEdit(tag)" />
            <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="deleteTag(tag)" />
          }
        </td>
      </tr>
    </ng-template>
  </p-table>
}

@if (activeTab() === 'rules') {
  <app-tag-rules />
}

<p-toast />
<p-confirmDialog />
