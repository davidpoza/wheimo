<div class="rules-toolbar">
  <p-button label="New Rule" icon="pi pi-plus" (onClick)="showForm.set(!showForm())" />
</div>

<p-dialog
  header="New Rule"
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [modal]="true"
  [style]="{ width: '480px' }"
>
  <form [formGroup]="form" (ngSubmit)="createRule()" class="rule-form">
    <div class="field">
      <label>Name *</label>
      <input pInputText formControlName="name" placeholder="Rule name" class="w-full" />
    </div>
    <div class="field">
      <label>Type *</label>
      <p-select formControlName="type" [options]="ruleTypes" optionLabel="label" optionValue="value" class="w-full" appendTo="body" />
    </div>
    @if (selectedType !== 'isExpense' && selectedType !== 'isReceipt') {
      <div class="field">
        <label>Value</label>
        <input pInputText formControlName="value" placeholder="e.g. Mercadona|Lidl or gt10;lt50" class="w-full" />
        @if (form.get('value')?.errors?.['invalidRegex'] && form.get('value')?.dirty) {
          <small class="p-error">Expresión regular inválida</small>
        }
      </div>
    }
    <div class="field">
      <label>Tags to apply</label>
      <p-multiselect formControlName="tagIds" [options]="tags()" optionLabel="name" optionValue="id" placeholder="Select tags" class="w-full" appendTo="body" />
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button type="button" label="Cancel" [text]="true" severity="secondary" (onClick)="showForm.set(false)" />
    <p-button label="Create" [disabled]="form.invalid" (onClick)="createRule()" />
  </ng-template>
</p-dialog>

<p-table [value]="rules()" styleClass="p-datatable-sm mt-2">
  <ng-template pTemplate="header">
    <tr>
      <th>Name</th>
      <th>Type</th>
      <th>Value</th>
      <th>Tags</th>
      <th style="width: 4rem"></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-rule>
    <tr>
      <td>{{ rule.name }}</td>
      <td><p-tag [value]="rule.type" severity="info" /></td>
      <td><code>{{ rule.value }}</code></td>
      <td>
        <div class="tags-cell">
          @for (tag of rule.tags; track tag.id) {
            <p-tag [value]="tag.name" severity="secondary" />
          }
        </div>
      </td>
      <td>
        <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="deleteRule(rule.id)" />
      </td>
    </tr>
  </ng-template>
</p-table>

<p-toast />
<p-confirmDialog />
