<div class="charts-page">
  <div class="charts-header">
    <h2>{{ 'charts.title' | transloco }}</h2>
    <p-select
      [(ngModel)]="selectedAccountId"
      (ngModelChange)="selectedAccountId.set($event); loadChart()"
      [options]="accounts()"
      optionLabel="name"
      optionValue="id"
      [placeholder]="'charts.selectAccount' | transloco"
      class="account-select"
    />
  </div>

  <div class="chart-section">
    <h3>{{ 'charts.balance.title' | transloco }}</h3>
    @if (chartData()) {
      <p-chart type="line" [data]="chartData()" [options]="chartOptions" styleClass="balance-chart" />
    } @else {
      <div class="chart-empty">{{ 'charts.balance.empty' | transloco }}</div>
    }
  </div>

  <div class="charts-grid">
    <div class="chart-section">
      <app-tag-expenses-chart [accountId]="selectedAccountId()" />
    </div>
    <div class="chart-section">
      <app-statistics [accountId]="selectedAccountId()" />
    </div>
  </div>

  <div class="chart-section">
    <app-heatmap [accountId]="selectedAccountId()" />
  </div>
</div>
