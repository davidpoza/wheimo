<div class="heatmap-section">
  <h3>{{ 'charts.heatmap.title' | transloco: { year: year } }}</h3>
  <div class="month-labels" [style.grid-template-columns]="gridCols()">
    @for (m of monthSpans(); track $index) {
      <span class="month-label" [style.grid-column]="m.start + ' / span ' + m.span">{{ m.name }}</span>
    }
  </div>
  <div class="heatmap-grid" [style.grid-template-columns]="gridCols()">
    @for (week of weeks(); track $index) {
      <div class="week-col">
        @for (day of week; track $index) {
          @if (day) {
            <div
              class="day-cell"
              [class]="intensity(day.amount)"
              [pTooltip]="day.label"
              tooltipPosition="top"
            ></div>
          } @else {
            <div class="day-cell empty"></div>
          }
        }
      </div>
    }
  </div>
</div>
