<div class="accounts-header">
  <h2>{{ 'accounts.list.title' | transloco }}</h2>
  <p-button [label]="'accounts.list.addAccount' | transloco" icon="pi pi-plus" styleClass="icon-only-mobile" (onClick)="openCreate()" />
</div>

<input #xlsInput type="file" accept=".xls" style="display:none" (change)="onXlsFileSelected($event)" />

<div class="accounts-grid">
  @for (account of accounts(); track account.id) {
    <p-card styleClass="account-card">
      <div class="account-info">
        <div class="account-main">
          <span class="account-name">{{ account.name }}</span>
          <p-tag [value]="account.bankId" severity="secondary" />
        </div>
        @if (account.keepBalance) {
          <span class="account-balance" [class.negative]="account.balance < 0">
            {{ account.balance | currency: 'EUR' : 'symbol' : '1.2-2' }}
          </span>
        }
        @if (account.description) {
          <span class="account-desc">{{ account.description }}</span>
        }
      </div>

      <div class="account-actions">
        <p-button icon="pi pi-upload" [text]="true" severity="secondary" (onClick)="openXlsImport(account)" [pTooltip]="'accounts.list.tooltip.import' | transloco" />
        <p-button icon="pi pi-refresh" [text]="true" severity="info" (onClick)="resync(account)" [pTooltip]="'accounts.list.tooltip.resync' | transloco" />
        <p-button icon="pi pi-pencil" [text]="true" (onClick)="openEdit(account)" [pTooltip]="'accounts.list.tooltip.edit' | transloco" />
        <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="delete(account)" [pTooltip]="'accounts.list.tooltip.delete' | transloco" />
      </div>
    </p-card>
  }
</div>

<app-edit-account-dialog
  [visible]="dialogVisible()"
  [account]="editingAccount()"
  (visibleChange)="dialogVisible.set($event)"
  (saved)="onDialogSave()"
/>

<p-toast />
<p-confirmDialog />
