<p-dialog
  [header]="'transactions.create.header' | transloco"
  [visible]="visible()"
  (visibleChange)="visibleChange.emit($event)"
  [modal]="true"
  [style]="{ width: '480px' }"
>
  <form [formGroup]="form" class="dialog-form">
    <div class="field">
      <label>{{ 'transactions.create.account' | transloco }}</label>
      <p-select formControlName="accountId" [options]="accountsService.accounts()" optionLabel="name" optionValue="id" class="w-full" appendTo="body" />
    </div>
    <div class="field">
      <label>{{ 'transactions.create.amount' | transloco }}</label>
      <p-inputnumber formControlName="amount" mode="decimal" [minFractionDigits]="2" class="w-full" />
    </div>
    <div class="field">
      <label>{{ 'transactions.create.currency' | transloco }}</label>
      <input pInputText formControlName="currency" class="w-full" />
    </div>
    <div class="field">
      <label>{{ 'transactions.create.date' | transloco }}</label>
      <p-datepicker formControlName="date" dateFormat="dd/mm/yy" [showTime]="true" class="w-full" appendTo="body" />
    </div>
    <div class="field">
      <label>{{ 'transactions.create.valueDate' | transloco }}</label>
      <p-datepicker formControlName="valueDate" dateFormat="dd/mm/yy" class="w-full" appendTo="body" />
    </div>
    <div class="field">
      <label>{{ 'transactions.create.description' | transloco }}</label>
      <input pInputText formControlName="description" class="w-full" />
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button [label]="'common.cancel' | transloco" [text]="true" severity="secondary" (onClick)="close()" />
    <p-button [label]="'transactions.create.create' | transloco" (onClick)="save()" [disabled]="form.invalid" />
  </ng-template>
</p-dialog>
