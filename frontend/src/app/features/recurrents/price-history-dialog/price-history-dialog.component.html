<p-dialog
  [header]="'Historial de precios — ' + recurrent().name"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="onHide()"
  [modal]="true"
  [style]="{ width: '720px' }"
  [breakpoints]="{ '768px': '95vw' }"
>
  <div class="history-container">
    <div class="history-actions">
      <p-button
        [label]="addFormVisible() ? 'Cancelar' : 'Registrar precio'"
        [icon]="addFormVisible() ? 'pi pi-times' : 'pi pi-plus'"
        [severity]="addFormVisible() ? 'secondary' : 'primary'"
        [text]="addFormVisible()"
        (onClick)="addFormVisible.set(!addFormVisible())"
      />
    </div>

    @if (addFormVisible()) {
      <form [formGroup]="form" class="add-form">
        <div class="form-row">
          <div class="field">
            <label>Precio (€) *</label>
            <p-inputnumber formControlName="amount" mode="decimal" [minFractionDigits]="2" class="w-full" />
          </div>
          <div class="field">
            <label>Unidades (opcional)</label>
            <p-inputnumber formControlName="units" mode="decimal" [maxFractionDigits]="3" class="w-full" />
          </div>
          <div class="field">
            <label>Fecha (vacío = hoy)</label>
            <p-datepicker formControlName="recordedAt" dateFormat="dd/mm/yy" [showTime]="false" class="w-full" appendTo="body" />
          </div>
        </div>
        <p-button label="Guardar" (onClick)="addEntry()" [disabled]="form.invalid" />
      </form>
    }

    @if (chartData()) {
      <div class="history-chart">
        <p-chart type="line" [data]="chartData()" [options]="chartOptions" height="240px" />
      </div>
    }

    <p-table [value]="history()" styleClass="p-datatable-sm" [rowHover]="true">
      <ng-template pTemplate="header">
        <tr>
          <th>Fecha</th>
          <th class="amount">Precio</th>
          <th class="amount">Unidades</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-entry>
        <tr>
          <td>{{ entry.recordedAt | date: 'dd/MM/yyyy HH:mm' }}</td>
          <td class="amount">{{ entry.amount | currency: 'EUR' }}</td>
          <td class="amount">
            @if (entry.units != null) {
              {{ entry.units }}
            } @else {
              <span class="muted">—</span>
            }
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3" class="empty">Sin entradas de precio aún.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cerrar" severity="secondary" (onClick)="onHide()" />
  </ng-template>
</p-dialog>

<p-toast />
