<p-dialog
  [header]="'Historial de precios — ' + recurrent().name"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onHide)="onHide()"
  [modal]="true"
  [style]="{ width: '520px' }"
>
  <div class="history-container">
    <div class="history-actions">
      <p-button
        [label]="addFormVisible() ? 'Cancelar' : 'Registrar precio'"
        [icon]="addFormVisible() ? 'pi pi-times' : 'pi pi-plus'"
        [severity]="addFormVisible() ? 'secondary' : 'primary'"
        [text]="addFormVisible()"
        (onClick)="addFormVisible.set(!addFormVisible())"
      />
    </div>

    @if (addFormVisible()) {
      <form [formGroup]="form" class="add-form">
        <div class="field">
          <label>Precio (€) *</label>
          <p-inputnumber formControlName="amount" mode="decimal" [minFractionDigits]="2" class="w-full" />
        </div>
        <div class="field">
          <label>Fecha (dejar vacío = hoy)</label>
          <p-datepicker formControlName="recordedAt" dateFormat="dd/mm/yy" [showTime]="false" class="w-full" appendTo="body" />
        </div>
        <p-button label="Guardar" (onClick)="addEntry()" [disabled]="form.invalid" />
      </form>
    }

    <p-table [value]="history()" styleClass="p-datatable-sm" [rowHover]="true">
      <ng-template pTemplate="header">
        <tr>
          <th>Fecha</th>
          <th>Precio</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-entry>
        <tr>
          <td>{{ entry.recordedAt | date: 'dd/MM/yyyy HH:mm' }}</td>
          <td class="amount">{{ entry.amount | currency: 'EUR' }}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="2" class="empty">Sin entradas de precio aún.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Cerrar" severity="secondary" (onClick)="onHide()" />
  </ng-template>
</p-dialog>

<p-toast />
