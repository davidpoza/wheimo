<p-toast />

<div class="profile-page">
  <div class="profile-card">
    <div class="profile-header">
      <i class="pi pi-user profile-icon"></i>
      <div class="profile-info">
        <h2 class="profile-name">{{ authService.currentUser()?.name || '—' }}</h2>
        <p class="profile-email">{{ authService.currentUser()?.email }}</p>
      </div>
    </div>

    <div class="profile-actions">
      <p-button
        [label]="'user.profile.changePassword' | transloco"
        icon="pi pi-lock"
        severity="secondary"
        [outlined]="true"
        (onClick)="openChangePassword()"
      />
      <p-button
        [label]="'user.profile.logout' | transloco"
        icon="pi pi-sign-out"
        severity="danger"
        [outlined]="true"
        (onClick)="logout()"
      />
    </div>
  </div>
</div>

<p-dialog
  [header]="'user.profile.changePassword' | transloco"
  [(visible)]="changePasswordVisible"
  [modal]="true"
  [style]="{ width: '24rem' }"
  (onHide)="closeChangePassword()"
>
  <form [formGroup]="form" class="password-form">
    <div class="field">
      <label for="currentPassword">{{ 'user.profile.form.currentPassword' | transloco }}</label>
      <p-password
        inputId="currentPassword"
        formControlName="currentPassword"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="newPassword">{{ 'user.profile.form.newPassword' | transloco }}</label>
      <p-password
        inputId="newPassword"
        formControlName="newPassword"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
    </div>

    <div class="field">
      <label for="confirmPassword">{{ 'user.profile.form.confirmPassword' | transloco }}</label>
      <p-password
        inputId="confirmPassword"
        formControlName="confirmPassword"
        [feedback]="false"
        [toggleMask]="true"
        styleClass="w-full"
        inputStyleClass="w-full"
      />
      @if (passwordsMismatch) {
        <small class="mismatch-error">{{ 'user.profile.mismatch' | transloco }}</small>
      }
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button [label]="'user.profile.cancel' | transloco" severity="secondary" [text]="true" (onClick)="closeChangePassword()" />
    <p-button
      [label]="'user.profile.save' | transloco"
      icon="pi pi-check"
      [disabled]="!canSave"
      [loading]="saving()"
      (onClick)="savePassword()"
    />
  </ng-template>
</p-dialog>
