<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Wheimo</h1>
    <p class="login-subtitle">{{ 'auth.login.subtitle' | transloco }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">
      <div class="field">
        <label for="email">{{ 'auth.login.email' | transloco }}</label>
        <input pInputText id="email" type="email" formControlName="email" [placeholder]="'auth.login.emailPlaceholder' | transloco" class="w-full" />
        @if (form.get('email')?.touched && form.get('email')?.hasError('email')) {
          <small class="p-error">{{ 'auth.login.invalidEmail' | transloco }}</small>
        }
      </div>

      <div class="field">
        <label for="password">{{ 'auth.login.password' | transloco }}</label>
        <p-password
          id="password"
          formControlName="password"
          [feedback]="false"
          [toggleMask]="true"
          [placeholder]="'auth.login.password' | transloco"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>

      @if (error()) {
        <p-message severity="error" [text]="error()!" styleClass="w-full" />
      }

      <p-button
        type="submit"
        [label]="'auth.login.submit' | transloco"
        [loading]="loading()"
        [disabled]="form.invalid"
        styleClass="w-full mt-2"
      />
    </form>
  </div>
</div>
